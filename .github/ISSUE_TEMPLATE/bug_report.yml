name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch CleanMe
        2. Select Figma
        3. Click Move to Trash
        4. See error
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: 14.4.1 (Sonoma)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: CleanMe version
      description: See the About page.
      placeholder: 1.0.0
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: If the app crashed or printed errors, paste them here.
      render: shell
